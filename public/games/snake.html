<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Snake</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:12px}
h1{font-size:1.5rem;margin-bottom:8px}
canvas{background:#1e293b;border-radius:8px;border:2px solid #334155;max-width:100%}
p{margin-top:8px;font-size:.75rem;color:#64748b}
</style>
</head>
<body>
<h1>Snake</h1>
<canvas id="c" width="400" height="400"></canvas>
<p>Arrow keys or swipe · Score: <span id="s">0</span></p>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d'),scoreEl=document.getElementById('s');
const N=20,W=canvas.width/N,H=canvas.height/N;
let snake=[{x:10,y:10}],dir={x:1,y:0},food={x:15,y:15},score=0,alive=true;
function randFood(){food={x:Math.floor(Math.random()*W),y:Math.floor(Math.random()*H)}}
function draw(){ctx.fillStyle='#1e293b';ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle='#22c55e';snake.forEach((p,i)=>{ctx.fillStyle=i===0?'#4ade80':'#22c55e';ctx.fillRect(p.x*N,p.y*N,N-1,N-1)});
ctx.fillStyle='#ef4444';ctx.fillRect(food.x*N,food.y*N,N-1,N-1)}
function tick(){if(!alive)return;const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
if(head.x<0||head.y<0||head.x>=W||head.y>=H||snake.some(s=>s.x===head.x&&s.y===head.y)){alive=false;setTimeout(()=>alert('Game over! '+score),50);return}
snake.unshift(head);if(head.x===food.x&&head.y===food.y){score++;scoreEl.textContent=score;randFood()}else snake.pop();
draw()}
setInterval(tick,120);
document.addEventListener('keydown',e=>{const m={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0}}[e.key];if(m){e.preventDefault();if(m.x!==-dir.x||m.y!==-dir.y)dir=m}});
let tx,ty;canvas.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY},{passive:true});
canvas.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>20)dir={x:dx>0?1:-1,y:0};else if(Math.abs(dy)>20)dir={x:0,y:dy>0?1:-1}},{passive:true});
draw();
</script>
</body>
</html>
